name: Build and Release

on:
  push:
    tags:
      - 'v*' # 仅在推送以 v 开头的 tag 时触发 (例如 v1.0.0)
  workflow_dispatch: # 允许在网页端手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate private core checkout secrets
        env:
          PRIVATE_CORE_REPOSITORY: ${{ secrets.PRIVATE_CORE_REPOSITORY }}
          PRIVATE_CORE_ACCESS_TOKEN: ${{ secrets.PRIVATE_CORE_ACCESS_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PRIVATE_CORE_REPOSITORY)) {
            throw "Missing PRIVATE_CORE_REPOSITORY secret. Expected format: owner/repo"
          }

          if ([string]::IsNullOrWhiteSpace($env:PRIVATE_CORE_ACCESS_TOKEN)) {
            throw "Missing PRIVATE_CORE_ACCESS_TOKEN secret. Refusing to build without private repository token."
          }

      - name: Read private core reference
        run: |
          $privateCoreRef = Get-Content private-core-ref.json -Raw | ConvertFrom-Json

          if ([string]::IsNullOrWhiteSpace($privateCoreRef.ref)) {
            throw "Missing `ref` in private-core-ref.json"
          }

          if ([string]::IsNullOrWhiteSpace($privateCoreRef.ci_checkout_path)) {
            throw "Missing `ci_checkout_path` in private-core-ref.json"
          }

          "PRIVATE_CORE_REF=$($privateCoreRef.ref)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PRIVATE_CORE_CHECKOUT_PATH=$($privateCoreRef.ci_checkout_path)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Checkout private core repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_CORE_REPOSITORY }}
          ref: ${{ env.PRIVATE_CORE_REF }}
          path: ${{ env.PRIVATE_CORE_CHECKOUT_PATH }}
          token: ${{ secrets.PRIVATE_CORE_ACCESS_TOKEN }}

      - name: Materialize private requirements
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PRIVATE_CORE_CHECKOUT_PATH)) {
            throw "Missing PRIVATE_CORE_CHECKOUT_PATH from private-core-ref.json"
          }

          if (-not (Test-Path $env:PRIVATE_CORE_CHECKOUT_PATH)) {
            throw "Private core checkout path not found: $env:PRIVATE_CORE_CHECKOUT_PATH"
          }

          if (-not (Test-Path (Join-Path $env:PRIVATE_CORE_CHECKOUT_PATH 'pyproject.toml'))) {
            throw "Private core repository missing pyproject.toml: $env:PRIVATE_CORE_CHECKOUT_PATH"
          }

          $privateRequirementsPath = ".private-requirements.txt"
          $normalizedCheckoutPath = $env:PRIVATE_CORE_CHECKOUT_PATH -replace '\\', '/'
          $content = "-e ./$normalizedCheckoutPath"
          $content | Out-File -FilePath $privateRequirementsPath -Encoding utf8 -NoNewline

          if (-not (Test-Path $privateRequirementsPath)) {
            throw "Failed to materialize .private-requirements.txt"
          }

          $materialized = Get-Content $privateRequirementsPath -Raw
          if ([string]::IsNullOrWhiteSpace($materialized)) {
            throw ".private-requirements.txt is empty after materialization"
          }

      - name: Install private core dependency
        run: |
          pip install -r .private-requirements.txt
          pip install pyinstaller

      - name: Inject version from tag
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            "${{ github.ref_name }}" | Out-File -FilePath VERSION -Encoding utf8 -NoNewline
          }
          Write-Host "VERSION content: $(Get-Content VERSION)"

      - name: Build with PyInstaller
        run: python build.py

      - name: Smoke test frozen executable
        run: |
          & "./dist/MouseBattery.exe" --smoke-test

      - name: Rename executable
        id: rename
        run: |
          # 提取版本号，如果不是 tag 触发，则使用 default
          if ("${{ github.ref_type }}" -eq "tag") {
            $VERSION = "${{ github.ref_name }}"
          } else {
            $VERSION = "latest"
          }
          $NEW_NAME = "MouseBattery-$VERSION.exe"
          Rename-Item -Path "dist/MouseBattery.exe" -NewName $NEW_NAME
          echo "EXE_NAME=$NEW_NAME" >> $env:GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT

      - name: Prepare release notes body
        id: release_notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          $version = "${{ steps.rename.outputs.VERSION }}"
          $candidatePath = Join-Path "docs/releases" "$version.md"

          if (Test-Path $candidatePath) {
            echo "BODY_PATH=$candidatePath" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $fallbackPath = "release-body-fallback.md"
          @"
# $version

- 本次发布未提供单独的版本说明文件，请回看对应提交记录与仓库文档。
"@ | Out-File -FilePath $fallbackPath -Encoding utf8
          echo "BODY_PATH=$fallbackPath" >> $env:GITHUB_OUTPUT

      - name: Release to GitHub
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') # 只有 tag 触发才创建 release
        with:
          name: Release ${{ steps.rename.outputs.VERSION }}
          prerelease: false
          body_path: ${{ steps.release_notes.outputs.BODY_PATH }}
          generate_release_notes: false
          files: dist/${{ steps.rename.outputs.EXE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact (可供手动下载)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.EXE_NAME }}
          path: dist/${{ steps.rename.outputs.EXE_NAME }}
